<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master JSA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --light: #f8f9fa;
            --dark: #212529;
            --gray: #6c757d;
            --border: #dee2e6;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --radius: 8px;
            --transition: all 0.3s ease;
            
            /* Warna untuk jenis file */
            --pdf-color: #e74c3c;
            --doc-color: #2c5cc5;
            --sheet-color: #27ae60;
            --ppt-color: #e67e22;
            --image-color: #9b59b6;
            --video-color: #34495e;
            --archive-color: #f39c12;
            --file-color: #7f8c8d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            color: var(--dark);
            line-height: 1.5;
            min-height: 100vh;
            padding: 0;
            margin: 0;
            font-size: 10px;
        }

        /* PERUBAHAN: Container full width */
        .container {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0 15px;
        }

        /* Header Styles */
        header {
            background: white;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
        }

        .logo i {
            font-size: 1.4rem;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-container {
            position: relative;
            width: 300px;
        }

        .search-input {
            width: 100%;
            padding: 8px 15px 8px 35px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: #f8f9fa;
            font-size: 10px;
            transition: var(--transition);
        }

        .search-input:focus {
            outline: none;
            background: white;
            box-shadow: 0 0 0 2px rgba(67, 97, 238, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 10px;
        }

        .view-controls {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .view-btn {
            background: var(--light);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
        }

        .view-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Toolbar Styles */
        .toolbar {
            background: white;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
        }

        .toolbar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toolbar-title {
            font-weight: 600;
            font-size: 11px;
        }

        .toolbar-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .sort-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
        }

        .sort-btn:hover {
            background: var(--light);
        }

        /* Main Content */
        main {
            padding: 20px 0;
        }

        /* File Grid/List */
        .files-container {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            /* PERUBAHAN: Full width */
            width: 100%;
        }

        .files-content {
            padding: 15px;
        }

        /* PERUBAHAN: Grid view dengan lebih banyak kolom */
        .grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .list-view {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-card {
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .file-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .grid-view .file-card {
            text-align: center;
            padding: 15px 10px;
        }

        .list-view .file-card {
            display: flex;
            align-items: center;
            padding: 10px 15px;
        }

        .file-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .list-view .file-icon {
            margin-bottom: 0;
            margin-right: 15px;
            font-size: 1.5rem;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            margin-bottom: 5px;
            word-break: break-word;
            font-size: 10px;
        }

        .grid-view .file-name {
            height: 2.4em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .file-meta {
            color: var(--gray);
            font-size: 9px;
        }

        .grid-view .file-meta {
            margin-bottom: 8px;
        }

        .file-actions {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .list-view .file-actions {
            margin-left: 10px;
        }

        .action-btn {
            background: none;
            border: none;
            border-radius: 4px;
            padding: 5px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--gray);
            font-size: 10px;
        }

        .action-btn:hover {
            background: var(--light);
            color: var(--primary);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px 0;
            color: var(--gray);
            font-size: 9px;
            margin-top: 30px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #dee2e6;
        }

        .empty-state h3 {
            font-size: 11px;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 10px;
            }

            .search-container {
                width: 100%;
                max-width: 400px;
            }

            .grid-view {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 10px;
            }
        }

        @media (max-width: 480px) {
            .grid-view {
                grid-template-columns: repeat(3, 1fr);
            }

            .view-btn span {
                display: none;
            }

            .view-btn {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-folder-open"></i>
                    <span>Master JSA</span>
                </div>
                <div class="header-actions">
                    <div class="search-container">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" class="search-input" id="search" placeholder="Cari file...">
                    </div>
                    <div class="view-controls">
                        <button class="view-btn active" data-view="grid" title="Grid View">
                            <i class="fas fa-th"></i>
                            <span>Grid</span>
                        </button>
                        <button class="view-btn" data-view="list" title="List View">
                            <i class="fas fa-list"></i>
                            <span>List</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="toolbar">
        <div class="container">
            <div class="toolbar-content">
                <div class="toolbar-title">Semua File</div>
                <div class="toolbar-actions">
                    <button class="sort-btn" id="sortBtn" title="Sortir">
                        <i class="fas fa-filter"></i>
                        <span>Sortir</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <main class="container">
        <!-- Files List View -->
        <div class="files-container">
            <div class="files-content">
                <div id="files" class="grid-view"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Master JSA. All rights reserved by MSA.</p>
        </div>
    </footer>

    <script>
        // Data contoh
        const sampleData = [
            { id: '1', name: 'presentation.pptx', size: 2450000, type: 'presentation' },
            { id: '2', name: 'laporan.pdf', size: 1200000, type: 'pdf' },
            { id: '3', name: 'data.xlsx', size: 850000, type: 'spreadsheet' },
            { id: '4', name: 'gambar.jpg', size: 450000, type: 'image' },
            { id: '5', name: 'video.mp4', size: 15400000, type: 'video' },
            { id: '6', name: 'dokumen.docx', size: 320000, type: 'document' },
            { id: '7', name: 'foto.png', size: 780000, type: 'image' },
            { id: '8', name: 'tutorial.mp4', size: 9800000, type: 'video' },
            { id: '9', name: 'manual.pdf', size: 2100000, type: 'pdf' },
            { id: '10', name: 'anggaran.xlsx', size: 540000, type: 'spreadsheet' }
        ];

        const WEBAPP = "https://script.google.com/macros/s/AKfycbzh5gAQUjMIVxX8WZSsNUGhg8PKt9CmlGno-to_pwAXlnu9-OF4QFLu97DdBsWcuT0x/exec";
        let data = [];
        let currentView = "grid";
        let sortBy = "name";

        // Inisialisasi aplikasi
        document.addEventListener('DOMContentLoaded', function() {
            // Load data
            fetch(WEBAPP)
                .then(r => r.json())
                .then(d => {
                    data = d;
                    renderFiles();
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    // Gunakan data contoh jika API tidak tersedia
                    data = sampleData;
                    renderFiles();
                });

            // Event listeners
            document.getElementById('search').addEventListener('input', renderFiles);
            document.getElementById('sortBtn').addEventListener('click', toggleSort);
            
            // View controls
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentView = this.getAttribute('data-view');
                    document.getElementById('files').className = currentView + '-view';
                });
            });
        });

        // File icon dan warna berdasarkan ekstensi
        function getFileInfo(name, type) {
            name = name.toLowerCase();
            
            if (type) {
                if (type === 'pdf') return { icon: 'fas fa-file-pdf', color: 'var(--pdf-color)' };
                if (type === 'spreadsheet') return { icon: 'fas fa-file-excel', color: 'var(--sheet-color)' };
                if (type === 'document') return { icon: 'fas fa-file-word', color: 'var(--doc-color)' };
                if (type === 'presentation') return { icon: 'fas fa-file-powerpoint', color: 'var(--ppt-color)' };
                if (type === 'image') return { icon: 'fas fa-file-image', color: 'var(--image-color)' };
                if (type === 'video') return { icon: 'fas fa-file-video', color: 'var(--video-color)' };
            }
            
            if (name.endsWith(".pdf")) return { icon: 'fas fa-file-pdf', color: 'var(--pdf-color)' };
            if (name.endsWith(".xlsx") || name.endsWith(".xls")) return { icon: 'fas fa-file-excel', color: 'var(--sheet-color)' };
            if (name.endsWith(".doc") || name.endsWith(".docx")) return { icon: 'fas fa-file-word', color: 'var(--doc-color)' };
            if (name.endsWith(".ppt") || name.endsWith(".pptx")) return { icon: 'fas fa-file-powerpoint', color: 'var(--ppt-color)' };
            if (name.endsWith(".jpg") || name.endsWith(".png") || name.endsWith(".jpeg")) return { icon: 'fas fa-file-image', color: 'var(--image-color)' };
            if (name.endsWith(".mp4") || name.endsWith(".mov")) return { icon: 'fas fa-file-video', color: 'var(--video-color)' };
            if (name.endsWith(".zip") || name.endsWith(".rar")) return { icon: 'fas fa-file-archive', color: 'var(--archive-color)' };
            return { icon: 'fas fa-file', color: 'var(--file-color)' };
        }

        // Format size
        function formatSize(size) {
            if (size < 1024) return size + " B";
            if (size < 1024 * 1024) return (size / 1024).toFixed(1) + " KB";
            return (size / 1024 / 1024).toFixed(1) + " MB";
        }

        // Render files
        function renderFiles() {
            const search = document.getElementById('search').value.toLowerCase();
            const filesContainer = document.getElementById('files');
            filesContainer.innerHTML = '';

            // Filter dan sortir data
            let filtered = data.filter(f => f.name.toLowerCase().includes(search));
            
            // Sortir data
            if (sortBy === 'name') {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortBy === 'size') {
                filtered.sort((a, b) => b.size - a.size);
            } else if (sortBy === 'type') {
                filtered.sort((a, b) => {
                    const aType = a.type || getFileType(a.name);
                    const bType = b.type || getFileType(b.name);
                    return aType.localeCompare(bType);
                });
            }

            // Render file cards
            filtered.forEach(f => {
                const fileInfo = getFileInfo(f.name, f.type);
                const fileElement = document.createElement('div');
                fileElement.className = 'file-card';
                
                // Klik langsung buka dengan Google Drive
                fileElement.addEventListener('click', () => {
                    const googleDocsUrl = `https://drive.google.com/file/d/${f.id}/view`;
                    window.open(googleDocsUrl, '_blank');
                });
                
                if (currentView === 'grid') {
                    fileElement.innerHTML = `
                        <div class="file-icon" style="color: ${fileInfo.color}">
                            <i class="${fileInfo.icon}"></i>
                        </div>
                        <div class="file-name">${f.name}</div>
                        <div class="file-meta">${formatSize(f.size)}</div>
                    `;
                } else {
                    fileElement.innerHTML = `
                        <div class="file-icon" style="color: ${fileInfo.color}">
                            <i class="${fileInfo.icon}"></i>
                        </div>
                        <div class="file-info">
                            <div class="file-name">${f.name}</div>
                            <div class="file-meta">${formatSize(f.size)} • ${getFileType(f.name, f.type)}</div>
                        </div>
                        <div class="file-actions">
                            <button class="action-btn" onclick="event.stopPropagation(); downloadFile('${f.id}', '${f.name}')" title="Download">
                                <i class="fas fa-download"></i>
                            </button>
                        </div>
                    `;
                }
                
                filesContainer.appendChild(fileElement);
            });
            
            // Tampilkan pesan jika tidak ada file
            if (filtered.length === 0) {
                filesContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>Tidak ada file yang ditemukan</h3>
                        <p>Coba ubah kata kunci pencarian Anda</p>
                    </div>
                `;
            }
        }

        // Dapatkan tipe file
        function getFileType(name, type) {
            if (type) {
                if (type === 'pdf') return 'PDF';
                if (type === 'spreadsheet') return 'Spreadsheet';
                if (type === 'document') return 'Dokumen';
                if (type === 'presentation') return 'Presentasi';
                if (type === 'image') return 'Gambar';
                if (type === 'video') return 'Video';
            }
            
            name = name.toLowerCase();
            if (name.endsWith(".pdf")) return "PDF";
            if (name.endsWith(".xlsx") || name.endsWith(".xls")) return "Spreadsheet";
            if (name.endsWith(".doc") || name.endsWith(".docx")) return "Dokumen";
            if (name.endsWith(".ppt") || name.endsWith(".pptx")) return "Presentasi";
            if (name.endsWith(".jpg") || name.endsWith(".png") || name.endsWith(".jpeg")) return "Gambar";
            if (name.endsWith(".mp4") || name.endsWith(".mov")) return "Video";
            return "File";
        }

        // Toggle sort
        function toggleSort() {
            const sortOptions = ['name', 'size', 'type'];
            const currentIndex = sortOptions.indexOf(sortBy);
            sortBy = sortOptions[(currentIndex + 1) % sortOptions.length];
            renderFiles();
        }

        // Download file
        function downloadFile(id, name) {
            const downloadUrl = `https://drive.google.com/uc?export=download&id=${id}`;
            const link = document.createElement('a');
            link.href = downloadUrl;
            link.download = name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
