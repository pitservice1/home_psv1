<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Fiori · Spreadsheet Download</title>
    <!-- Font Awesome 6 (gratis) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ----- reset & base ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '72', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            background: #f5f7fa;
            overflow: hidden;
        }

        /* ----- app wrapper (gaya SAP Fiori) ----- */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            background: #f5f7fa;
        }

        /* HEADER – SAP Fiori (blue gradient, flat) */
        .fiori-header {
            background: linear-gradient(135deg, #0a2b4b 0%, #1a5a7a 100%);
            padding: 0 28px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 12px rgba(0, 20, 40, 0.25);
            border-bottom: 2px solid #4da1b0;
            flex-shrink: 0;
        }

        .fiori-header .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .fiori-header .brand i {
            color: #b6e6ff;
            font-size: 1.9rem;
            text-shadow: 0 2px 3px rgba(0,0,0,0.1);
        }

        .fiori-header .brand h1 {
            color: white;
            font-weight: 400;
            font-size: 1.5rem;
            letter-spacing: 0.3px;
        }

        .fiori-header .brand h1 span {
            font-weight: 300;
            color: #b0d9ee;
            margin-left: 8px;
        }

        /* user / avatar kecil (SAP style) */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .header-actions .icon-btn {
            background: transparent;
            border: none;
            color: #c8e2f0;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions .icon-btn:hover {
            color: white;
            transform: scale(1.05);
        }

        .avatar {
            background: #2f7896;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            border: 2px solid #8ac4d9;
            cursor: default;
        }

        /* NAVIGATION BAR (SAP Fiori - shell bar) */
        .fiori-navbar {
            background: #ffffff;
            padding: 6px 24px;
            display: none;   /* default hidden, muncul saat iframe aktif */
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #d0dce8;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .fiori-navbar.visible {
            display: flex;
        }

        .nav-back {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #eaf1f9;
            padding: 6px 18px 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            color: #1b4c6b;
            transition: 0.15s;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .nav-back i {
            font-size: 0.9rem;
            color: #2f7b9e;
        }

        .nav-back:hover {
            background: #d6e6f5;
            border-color: #a1c6dd;
            transform: translateX(-3px);
        }

        .nav-breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            color: #335e7a;
            font-size: 0.95rem;
        }

        .nav-breadcrumb .sep {
            color: #9eb6cc;
            margin: 0 4px;
        }

        .nav-breadcrumb .active {
            font-weight: 600;
            color: #0a2e47;
        }

        .nav-spacer {
            flex: 1;
        }

        /* quick tabs (SAP Fiori chip) */
        .quick-tabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 4px 0;
            max-width: 45%;
            flex-wrap: nowrap;
        }

        .quick-tab {
            background: #edf3f9;
            border: 1px solid transparent;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1f4d6a;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quick-tab i {
            color: #3a7d9e;
            font-size: 0.8rem;
        }

        .quick-tab.active {
            background: #d4e6fa;
            border-color: #2f88ae;
            color: #06324b;
            font-weight: 600;
        }

        .quick-tab:hover {
            background: #d1e0ef;
            transform: translateY(-1px);
        }

        /* tombol download di navbar (SAP Fiori primary) */
        .btn-download-primary {
            background: #197a9e;
            border: none;
            padding: 7px 22px 7px 18px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(15, 80, 110, 0.3);
            transition: 0.15s;
            border: 1px solid #74bcd6;
            white-space: nowrap;
        }

        .btn-download-primary i {
            font-size: 1.1rem;
        }

        .btn-download-primary:hover {
            background: #218db5;
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 8px 16px #0b4b66;
        }

        .btn-download-primary:active {
            transform: scale(0.97);
        }

        /* ----- MENU UTAMA (kartu) SAP Fiori Cards ----- */
        .menu-container {
            flex: 1;
            padding: 32px 28px;
            overflow-y: auto;
            background: #f5f7fa;
        }

        .menu-container.hidden {
            display: none;
        }

        .menu-title {
            font-size: 1.4rem;
            font-weight: 400;
            color: #0b334a;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            letter-spacing: 0.2px;
        }

        .menu-title i {
            color: #1f7296;
            font-size: 2rem;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
        }

        /* kartu SAP Fiori (object card) */
        .fiori-card {
            background: white;
            border-radius: 20px;
            padding: 28px 18px 20px;
            box-shadow: 0 6px 18px rgba(0, 30, 55, 0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #e6edf5;
        }

        .fiori-card:hover {
            border-color: #3f98bb;
            box-shadow: 0 18px 30px -8px #1d4b66;
            transform: translateY(-6px);
        }

        .fiori-card .card-icon {
            width: 76px;
            height: 76px;
            background: #e8f2fa;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #135e7e;
        }

        .fiori-card .card-title {
            font-size: 1.2rem;
            font-weight: 500;
            color: #0d3a54;
            letter-spacing: 0.2px;
        }

        .fiori-card .card-caption {
            background: #eff6fd;
            padding: 10px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #265c7a;
            border: 1px solid #d6e4f0;
            width: 100%;
            font-weight: 400;
            line-height: 1.4;
        }

        /* IFRAME (SAP Fiori clean) */
        .iframe-container {
            flex: 1;
            display: none;
            background: #eef2f7;
            position: relative;
        }

        .iframe-container.visible {
            display: flex;
        }

        #sheetFrame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.02);
        }

        /* LOADING (SAP Fiori) */
        .loading-fiori {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fffffffa;
            padding: 28px 40px;
            border-radius: 40px;
            box-shadow: 0 30px 50px rgba(0, 20, 40, 0.4);
            display: none;
            text-align: center;
            border: 1px solid #b5d6e8;
            backdrop-filter: blur(3px);
            z-index: 500;
        }

        .loading-fiori .spinner {
            width: 44px;
            height: 44px;
            border: 5px solid #d8e5f0;
            border-top-color: #1b749b;
            border-radius: 50%;
            animation: spin 0.8s infinite linear;
            margin: 0 auto 14px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-fiori p {
            color: #13506e;
            font-weight: 500;
        }

        /* NOTIF (SAP Fiori - success) */
        .notif-fiori {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #1d7c6b;
            color: white;
            padding: 14px 28px;
            border-radius: 60px;
            box-shadow: 0 8px 20px #125a4b;
            display: none;
            align-items: center;
            gap: 14px;
            font-weight: 500;
            z-index: 600;
            font-size: 0.95rem;
            border: 1px solid #8cd4c2;
        }

        /* dropdown download (SAP Fiori popover) */
        .fiori-dropdown {
            position: absolute;
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0, 30, 60, 0.35);
            padding: 12px;
            min-width: 190px;
            display: none;
            flex-direction: column;
            gap: 6px;
            border: 1px solid #bfd8ec;
            z-index: 400;
        }

        .fiori-dropdown button {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 18px;
            border: none;
            background: #f3f8ff;
            border-radius: 40px;
            font-weight: 500;
            color: #174f6d;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
            width: 100%;
        }

        .fiori-dropdown button i {
            font-size: 1.2rem;
            width: 28px;
            color: #2d7b9e;
        }

        .fiori-dropdown button:hover {
            background: #dcecfa;
            transform: translateX(4px);
        }

        /* Overlay untuk menutup dropdown */
        .dropdown-overlay {
            position: fixed;
            inset: 0;
            background: transparent;
            z-index: 399;
            display: none;
        }

        /* Responsif */
        @media (max-width: 900px) {
            .card-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .card-grid { grid-template-columns: 1fr; }
            .fiori-header .brand h1 { font-size: 1.1rem; }
            .fiori-header .brand h1 span { display: none; }
            .quick-tabs { max-width: 100%; }
            .btn-download-primary span { display: none; }
            .btn-download-primary { padding: 7px 16px; }
        }
    </style>
</head>
<body>

<div class="app-wrapper">

    <!-- HEADER SAP FIORI -->
    <header class="fiori-header">
        <div class="brand">
            <i class="fas fa-table"></i>
            <h1>Report data MWT</h1>
        </div>
        <div class="header-actions">
            <button class="icon-btn" title="Notifikasi"><i class="fas fa-bell"></i></button>
            <button class="icon-btn" title="Bantuan"><i class="fas fa-question-circle"></i></button>
            <div class="avatar">PSV</div>
        </div>
    </header>

    <!-- NAVBAR (muncul saat sheet terbuka) -->
    <div class="fiori-navbar" id="fioriNavbar">
        <div class="nav-back" id="navBackBtn">
            <i class="fas fa-arrow-left"></i> Kembali
        </div>
        <div class="nav-breadcrumb" id="breadcrumb">
            <span>Spreadsheet</span>
            <span class="sep"><i class="fas fa-chevron-right"></i></span>
            <span class="active" id="activeSheetName">Laporan</span>
        </div>
        <div class="nav-spacer"></div>

        <!-- Quick Tabs (sheet lain) -->
        <div class="quick-tabs" id="quickTabs"></div>

        <!-- Tombol Download (primary) -->
        <button class="btn-download-primary" id="headerDownloadBtn">
            <i class="fas fa-download"></i>
            <span>Download</span>
        </button>
    </div>

    <!-- MENU UTAMA (Kartu) -->
    <div class="menu-container" id="menuContainer">
        <div class="menu-title">
                        Pilih Laporan
        </div>
        <div class="card-grid" id="cardGrid"></div>
    </div>

    <!-- IFRAME -->
    <div class="iframe-container" id="iframeContainer">
        <iframe id="sheetFrame" src="about:blank"></iframe>
    </div>
</div>

<!-- LOADING -->
<div class="loading-fiori" id="loadingFiori">
    <div class="spinner"></div>
    <p>Mempersiapkan unduhan...</p>
</div>

<!-- NOTIFIKASI -->
<div class="notif-fiori" id="notifFiori">
    <i class="fas fa-check-circle"></i>
    <span id="notifMsg">Berhasil</span>
</div>

<!-- DROPDOWN (untuk tombol download) -->
<div class="fiori-dropdown" id="downloadDropdown">
    <button class="dd-excel"><i class="fas fa-file-excel"></i> Excel (XLSX)</button>
    <button class="dd-pdf"><i class="fas fa-file-pdf"></i> PDF</button>
    <button class="dd-ods"><i class="fas fa-file"></i> ODS</button>
</div>
<div class="dropdown-overlay" id="dropdownOverlay"></div>

<script>
    (function() {
        // ---- KONFIGURASI SHEET (dengan gid) ----
        const sheets = {
            sheet1: { id: "1Q2th3OirVj1PWRcl70fgJgmUuji03gBmP9Kvrj3ad1E", gid: "1101821162", name: "Sampel TSS Kelayang" },
            sheet2: { id: "1_QEw0cPXGLu5xar7YJq6IuIu9Lkfb8xMLl4o0osdGe0", gid: "99887734", name: "Report TSS" },
            sheet3: { id: "1HhUmariaHQiJ1AJU_zWcSO_-mBrJjznHzdhXGOyinwY", gid: "0", name: "Level & Debit" },
            sheet4: { id: "1HhUmariaHQiJ1AJU_zWcSO_-mBrJjznHzdhXGOyinwY", gid: "351995083", name: "Weekly KPC" },
            sheet5: { id: "1_QEw0cPXGLu5xar7YJq6IuIu9Lkfb8xMLl4o0osdGe0", gid: "1734937152", name: "TSS Perjam" }
        };

        const captions = {
            sheet1: "Sampel TSS Kelayang 1 & 2 per 2 hari",
            sheet2: "Rekapitulasi TSS Average in & out",
            sheet3: "Tinggi muka air dan debit all pond",
            sheet4: "Pemakaian Chemical ke KPC",
            sheet5: "Data TSS Perjam"
        };

        // ---- DOM refs ----
        const menuContainer = document.getElementById('menuContainer');
        const iframeContainer = document.getElementById('iframeContainer');
        const fioriNavbar = document.getElementById('fioriNavbar');
        const navBackBtn = document.getElementById('navBackBtn');
        const breadcrumb = document.getElementById('breadcrumb');
        const quickTabs = document.getElementById('quickTabs');
        const sheetFrame = document.getElementById('sheetFrame');
        const loadingFiori = document.getElementById('loadingFiori');
        const notifFiori = document.getElementById('notifFiori');
        const notifMsg = document.getElementById('notifMsg');
        const headerDownloadBtn = document.getElementById('headerDownloadBtn');
        const downloadDropdown = document.getElementById('downloadDropdown');
        const dropdownOverlay = document.getElementById('dropdownOverlay');
        const activeSheetName = document.getElementById('activeSheetName');

        let currentSheetKey = 'sheet1';

        // ---- Helper notif ----
        function showNotif(msg) {
            notifMsg.innerText = msg;
            notifFiori.style.display = 'flex';
            clearTimeout(window.notifTimer);
            window.notifTimer = setTimeout(() => {
                notifFiori.style.display = 'none';
            }, 2800);
        }

        // ---- Render kartu ----
        function renderCards() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = '';
            const icons = ['fa-water', 'fa-chart-line', 'fa-tachometer-alt', 'fa-flask', 'fa-clock'];
            Object.entries(sheets).forEach(([key, val], idx) => {
                const card = document.createElement('div');
                card.className = 'fiori-card';
                card.dataset.sheet = key;
                card.innerHTML = `
                    <div class="card-icon"><i class="fas ${icons[idx % icons.length]}"></i></div>
                    <div class="card-title">${val.name}</div>
                    <div class="card-caption">${captions[key] || 'Tidak ada deskripsi'}</div>
                `;
                card.addEventListener('click', () => loadSheet(key));
                grid.appendChild(card);
            });
        }
        renderCards();

        // ---- Navigasi / Tab ----
        function updateNav(sheetKey) {
            const s = sheets[sheetKey];
            if (!s) return;
            activeSheetName.innerText = s.name;
            // quick tabs
            quickTabs.innerHTML = '';
            Object.entries(sheets).forEach(([key, val]) => {
                const tab = document.createElement('span');
                tab.className = `quick-tab ${key === sheetKey ? 'active' : ''}`;
                tab.innerHTML = `<i class="fas fa-file-excel"></i> ${val.name}`;
                tab.addEventListener('click', () => loadSheet(key));
                quickTabs.appendChild(tab);
            });
        }

        function showMenu() {
            menuContainer.classList.remove('hidden');
            iframeContainer.classList.remove('visible');
            fioriNavbar.classList.remove('visible');
            downloadDropdown.style.display = 'none';
            dropdownOverlay.style.display = 'none';
        }

        function showIframe() {
            menuContainer.classList.add('hidden');
            iframeContainer.classList.add('visible');
            fioriNavbar.classList.add('visible');
        }

        // ---- Load sheet ke iframe ----
        function loadSheet(sheetKey) {
            const s = sheets[sheetKey];
            if (!s) return;
            currentSheetKey = sheetKey;
            loadingFiori.style.display = 'block';
            sheetFrame.src = `https://docs.google.com/spreadsheets/d/${s.id}/edit?hl=id&gid=${s.gid}`;
            updateNav(sheetKey);
            sheetFrame.onload = () => {
                loadingFiori.style.display = 'none';
                showNotif(`Memuat ${s.name}`);
            };
            showIframe();
        }

        navBackBtn.addEventListener('click', showMenu);

        // ---- Download aktif (dengan GID) ----
        function getCurrentSheet() {
            return sheets[currentSheetKey];
        }

        function triggerDownload(format) {
            const sheet = getCurrentSheet();
            if (!sheet) {
                showNotif('Tidak ada sheet aktif');
                return;
            }
            loadingFiori.style.display = 'block';
            downloadDropdown.style.display = 'none';
            dropdownOverlay.style.display = 'none';

            setTimeout(() => {
                let url = `https://docs.google.com/spreadsheets/d/${sheet.id}/export?gid=${sheet.gid}`;
                let ext = 'xlsx';
                if (format === 'excel') { url += '&format=xlsx'; ext = 'xlsx'; }
                else if (format === 'pdf') { url += '&format=pdf&portrait=false&fitw=true&gridlines=false&size=A4'; ext = 'pdf'; }
                else if (format === 'ods') { url += '&format=ods'; ext = 'ods'; }

                const a = document.createElement('a');
                a.href = url;
                a.download = `${sheet.name.replace(/\s/g,'_')}.${ext}`;
                a.target = '_blank';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                loadingFiori.style.display = 'none';
                showNotif(`Mengunduh ${sheet.name} (${format.toUpperCase()})`);
            }, 500);
        }

        // ---- Dropdown download (tombol header) ----
        function toggleDropdown(e) {
            e.stopPropagation();
            const isOpen = downloadDropdown.style.display === 'flex';
            if (isOpen) {
                downloadDropdown.style.display = 'none';
                dropdownOverlay.style.display = 'none';
            } else {
                // posisikan di bawah tombol
                const rect = headerDownloadBtn.getBoundingClientRect();
                downloadDropdown.style.top = (rect.bottom + window.scrollY + 8) + 'px';
                downloadDropdown.style.left = (rect.left + window.scrollX - 30) + 'px';
                downloadDropdown.style.display = 'flex';
                dropdownOverlay.style.display = 'block';
            }
        }

        headerDownloadBtn.addEventListener('click', toggleDropdown);
        dropdownOverlay.addEventListener('click', () => {
            downloadDropdown.style.display = 'none';
            dropdownOverlay.style.display = 'none';
        });

        // event tombol dropdown
        document.querySelector('.dd-excel').addEventListener('click', (e) => { e.stopPropagation(); triggerDownload('excel'); });
        document.querySelector('.dd-pdf').addEventListener('click', (e) => { e.stopPropagation(); triggerDownload('pdf'); });
        document.querySelector('.dd-ods').addEventListener('click', (e) => { e.stopPropagation(); triggerDownload('ods'); });

        // tekan Escape tutup dropdown
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                downloadDropdown.style.display = 'none';
                dropdownOverlay.style.display = 'none';
            }
        });

        // ---- inisialisasi: menu tampil ----
        showMenu();
        // set default sheet name di breadcrumb
        activeSheetName.innerText = sheets.sheet1.name;
    })();
</script>
</body>
</html>
