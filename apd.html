<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu APD Pit Service</title>

<!-- Font Awesome Icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body{
        background: linear-gradient(135deg, #dff6ff, #b8e8fc);
        min-height:100vh;
        padding:30px 20px;
    }

    .container{
        max-width:1100px;
        margin:auto;
    }

    .header{
        text-align:center;
        margin-bottom:35px;
    }

    .header h1{
        font-size:32px;
        color:#0b4f6c;
        margin-bottom:8px;
    }

    .header p{
        color:#355070;
        font-size:15px;
    }

    .menu-grid{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
        gap:22px;
    }

    .card{
        background:white;
        border-radius:22px;
        padding:28px 20px;
        text-decoration:none;
        color:#333;
        box-shadow:0 10px 25px rgba(0,0,0,0.08);
        transition:all 0.3s ease;
        text-align:center;
    }

    .card:hover{
        transform:translateY(-8px);
        box-shadow:0 15px 30px rgba(0,0,0,0.12);
    }

    .icon-box{
        width:75px;
        height:75px;
        margin:auto;
        border-radius:20px;
        background:#e3f6ff;
        display:flex;
        align-items:center;
        justify-content:center;
        margin-bottom:18px;
    }

    .icon-box i{
        font-size:32px;
        color:#0096c7;
    }

    .card h3{
        font-size:20px;
        margin-bottom:10px;
        color:#023047;
    }

    .card p{
        font-size:14px;
        color:#666;
        line-height:1.5;
    }

    footer{
        text-align:center;
        margin-top:40px;
        font-size:13px;
        color:#4f6d7a;
    }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>APD Management</h1>
        <p>Pit Service Air - Quick Access Menu</p>
    </div>

    <div class="menu-grid">

        <a href="https://sites.google.com/view/pit-service-air/11apd/serah-terima" target="_blank" class="card">
            <div class="icon-box">
                <i class="fas fa-file-signature"></i>
            </div>
            <h3>Input Transaksi</h3>
            <p>Input data serah terima dan transaksi APD.</p>
        </a>

        <a href="https://docs.google.com/forms/d/e/1FAIpQLSemUtp5oVI1_8QkzURXLWGTijMzSajyE2MqxvLgvU_NDJRX4Q/viewform" target="_blank" class="card">
            <div class="icon-box">
                <i class="fas fa-box-open"></i>
            </div>
            <h3>Pengajuan</h3>
            <p>Form pengajuan APD ke SHE.</p>
        </a>

        <a href="https://forms.gle/3idP5X7tS4r9jJHX9" target="_blank" class="card">
            <div class="icon-box">
                <i class="fas fa-handshake"></i>
            </div>
            <h3>Tanda Terima APD</h3>
            <p>Form tanda terima APD ke SHE.</p>
        </a>

        <a href="https://docs.google.com/spreadsheets/d/1v5Xyj00qmj4pzCGoyRPydwLjDfu57nMBcOWtTognoyg/edit?gid=1245499998#gid=1245499998" target="_blank" class="card">
            <div class="icon-box">
                <i class="fas fa-database"></i>
            </div>
            <h3>Database</h3>
            <p>Akses database monitoring dan pencatatan APD.</p>
        </a>

    </div>

    <footer>
        © 2026 Pit Service Air
    </footer>
</div>

</body>
</html>
